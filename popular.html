<body>
    <div id="app" v-cloak>
        <div class="top-nav-bar">
            <div class="container clearfix">
                <div class="fl left"><a :href="`index.html?gameChannelId=${gameChannelId}`"></a></div>
                <div class="nav-center" v-cloak>
                    <ul class="navbar_nav"><template v-for="cate in mainCategories" :key="cate.id">
                            <li class="active"><a
                                    :href="cate.id === 15 ? `index.html?gameChannelId=${gameChannelId}` : handleToType(cate)">{{cate.name}}</a>
                            </li>
                            <li v-if="cate.id === 15" class="active"><a
                                    :href="`popular.html?gameChannelId=${gameChannelId}`">Popular</a></li>
                        </template>
                        <li class="active"><a :href="`history.html?gameChannelId=${gameChannelId}`">History</a></li>
                        <li class="dropdown more-categories" v-if="moreCategories.length > 0"><a
                                href="javascript:void(0)">More <span class="dropdown-arrow">▼</span></a>
                            <ul class="dropdown-menu">
                                <li v-for="cate in moreCategories" :key="cate.id"><a
                                        :href="handleToType(cate)">{{cate.name}}</a></li>
                            </ul>
                        </li>
                        <li class="active"><a :href="`search.html?gameChannelId=${gameChannelId}`">Search <span
                                    class="dropdown-arrow"><img src="images/tubiao11.png" width="12px" /></span></a>
                        </li>
                    </ul>
                </div><a href="javascript:void(0)" id="navToggle"><span></span></a>
            </div>
        </div>
        <div class="m_nav">
            <div class="top clearfix"><img src="images/guanbi.png" alt="" class="closed" /></div>
            <ul class="ul" data-in="fadeInDown" data-out="fadeOutUp"><template v-for="cate in mainCategories"
                    :key="cate.id">
                    <li class="active"><a
                            :href="cate.id === 15 ? `index.html?gameChannelId=${gameChannelId}` : handleToType(cate)">{{cate.name}}</a>
                    </li>
                    <li v-if="cate.id === 15" class="active"><a
                            :href="`popular.html?gameChannelId=${gameChannelId}`">Popular</a></li>
                </template>
                <li class="active"><a :href="`history.html?gameChannelId=${gameChannelId}`">History</a></li>
                <li class="dropdown more-categories" v-if="moreCategories.length > 0"><a href="javascript:void(0)">More
                        <span class="dropdown-arrow">▼</span></a>
                    <div class="dropdown_menu"><a v-for="cate in moreCategories" :key="cate.id"
                            :href="handleToType(cate)">{{cate.name}}</a></div>
                </li>
                <li class="active"><a :href="`search.html?gameChannelId=${gameChannelId}`">Search <span
                            class="dropdown-arrow"><img src="images/tubiao33.png" width="12px" /></span></a></li>
            </ul>
        </div>
        <main>
            <section class="section" style="padding: 20px 0;">
                <div class="ad-container" style="max-height: 120px; overflow: hidden;">
                    <!--ads start--->
                    <!-- v -->
                    <ins class="adsbygoogle" style="display:inline-block;width:620px;height:90px"
                        data-ad-client="ca-pub-2591882719569178" data-ad-slot="5894005529"></ins>
                    <!--ads stop--->
                </div>
            </section>
            <section class="section">
                <div class="container">
                    <div class="row">
                        <div class="col-12">
                            <div class="section-title text-center mb-4">
                                <h4 class="title"><i class="min-wujiaox">★</i><i class="max-wujiaox">★</i> Popular Games
                                    <i class="max-wujiaox">★</i><i class="min-wujiaox">★</i>
                                </h4>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-4 col-lg-3 mt-6 pt-3" v-for="item in list" :key="item.gameId"><a
                                :href="handleToDetail(item.gameId, 'Popular')">
                                <div class="position-relative overflow-hidden blog rounded shadow">
                                    <div class="position-relative overflow-hidden blog rounded shadow">
                                        <div class="position-relative overflow-hidden"><img :src="item.gameLogo"
                                                :data-src="item.gameLogo" :alt="`${item.gameLogo}|${item.gameId}`"
                                                class="img-fluid blog-img">
                                        </div>
                                        <div class="content">
                                            <span class="title text-dark d-block2">{{item.gameName}}</span>
                                        </div>
                                    </div>
                            </a></div>
                    </div>
                    <div class="row mt-4" v-if="totalPages > 1">
                        <div class="col-12">
                            <nav aria-label="Page navigation">
                                <ul class="pagination justify-content-center">
                                    <li class="page-item" :class="{ disabled: currentPage === 1 }"><a class="page-link"
                                            href="javascript:void(0)" @click="goToPage(currentPage - 1)"
                                            :tabindex="currentPage === 1 ? -1 : 0">←</a></li>
                                    <li class="page-item" v-for="pageNum in getPageNumbers()" :key="pageNum"
                                        :class="{ active: pageNum === currentPage, disabled: pageNum === '...' }"><a
                                            v-if="pageNum !== '...'" class="page-link" href="javascript:void(0)"
                                            @click="goToPage(pageNum)">{{ pageNum }}</a><span v-else
                                            class="page-link">{{ pageNum }}</span></li>
                                    <li class="page-item" :class="{ disabled: currentPage === totalPages }"><a
                                            class="page-link" href="javascript:void(0)"
                                            @click="goToPage(currentPage + 1)"
                                            :tabindex="currentPage === totalPages ? -1 : 0">→</a></li>
                                </ul>
                            </nav>
                        </div>
                    </div>
                </div>
            </section>
        </main>
        <footer v-html="footer"></footer>
    </div>
</body>
<script src="script/jquery-1.10.2.js"></script>
<script src="script/footer.js"></script>
<script src="script/main.js"></script>
<script src="script/vue.min.js"></script>
<script src="script/axios.min.js"></script>
<script src="script/bootstrap.bundle.min.js"></script>
<script src="script/bootstrap-3.3.4.js"></script>
<script src="script/swiper.min.js"></script>
<script src="script/header.js"></script>
<script src="script/popular.js"></script>
<script>
    window.onload = function() {
        (adsbygoogle = window.adsbygoogle || []).push({});
    }
</script>
</html>
