<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="shortcut icon" href="images/youxi_icon.png" type="image/x-icon" />
    <link rel="stylesheet" type="text/css" href="style/index.css" />
    <link rel="stylesheet" type="text/css" href="style/bootstrap.min.css" />
    <link rel="stylesheet" type="text/css" href="style/style2.css" />
    <link rel="stylesheet" type="text/css" href="style/reset.css" />
    <link rel="stylesheet" type="text/css" href="style/swiper.min.css" />
    <link rel="stylesheet" type="text/css" href="style//head.css" />
    <link rel="stylesheet" type="text/css" href="style/public.css" />
    <link rel="stylesheet" type="text/css" href="style/vue.css" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2591882719569178"
     crossorigin="anonymous"></script>
</head>
<body>

    <div id="app" v-cloak>
        <div class="top-nav-bar">
            <div class="container clearfix">
                <div class="fl left"><a :href="`index.html?gameChannelId=${gameChannelId}`"></a></div>
                <div class="nav-center" v-cloak>
                    <ul class="navbar_nav"><template v-for="cate in mainCategories" :key="cate.id">
                            <li class="active"><a
                                    :href="cate.id === 15 ? `index.html?gameChannelId=${gameChannelId}` : handleToType(cate)">{{cate.name}}</a>
                            </li>
                            <li v-if="cate.id === 15" class="active"><a
                                    :href="`popular.html?gameChannelId=${gameChannelId}`">Popular</a></li>
                        </template>
                        <li class="active"><a :href="`history.html?gameChannelId=${gameChannelId}`">History</a></li>
                        <li class="dropdown more-categories" v-if="moreCategories.length > 0"><a
                                href="javascript:void(0)">More <span class="dropdown-arrow">▼</span></a>
                            <ul class="dropdown-menu">
                                <li v-for="cate in moreCategories" :key="cate.id"><a
                                        :href="handleToType(cate)">{{cate.name}}</a></li>
                            </ul>
                        </li>
                        <li class="active"><a :href="`search.html?gameChannelId=${gameChannelId}`">Search <span
                                    class="dropdown-arrow"><img src="images/tubiao11.png" width="12px" /></span></a>
                        </li>
                    </ul>
                </div><a href="javascript:void(0)" id="navToggle"><img src="images/caidan.png" /></a>
            </div>
        </div>
        <div class="m_nav">
            <div class="top clearfix"><img src="images/guanbi.png" alt="" class="closed" /></div>
            <ul class="ul" data-in="fadeInDown" data-out="fadeOutUp">
                <template v-for="cate in mainCategories"
                    :key="cate.id">
                    <li class="active">
                        <a :href="cate.id === 15 ? `index.html?gameChannelId=${gameChannelId}` : handleToType(cate)">{{cate.name}}</a>
                    </li>
                    <li v-if="cate.id === 15" class="active">
                        <a :href="`popular.html?gameChannelId=${gameChannelId}`">Popular</a>
                    </li>
                </template>
                <li class="active"><a :href="`history.html?gameChannelId=${gameChannelId}`">History</a></li>
                <li class="dropdown more-categories" v-if="moreCategories.length > 0"><a href="javascript:void(0)">More<span class="dropdown-arrow">▼</span></a>
                    <div class="dropdown_menu">
                        <a v-for="cate in moreCategories" :key="cate.id" :href="handleToType(cate)">{{cate.name}}</a>
                    </div>
                </li>
                <li class="active">
                    <a :href="`search.html?gameChannelId=${gameChannelId}`">
                        Search 
                        <span class="dropdown-arrow"><img src="images/tubiao33.png" width="12px" /></span>
                    </a>
                </li>
            </ul>
        </div>
        <main>
             <section class="section" style="padding: 20px 0;">
                <div class="ad-container" style="max-height: 120px; overflow: hidden;">
                <!--ads start--->
                    <!-- A -->
                        <ins class="adsbygoogle"
                        style="display:block"
                        data-ad-client="ca-pub-2591882719569178"
                        data-ad-slot="8874338763"
                        data-ad-format="auto"
                        data-full-width-responsive="true"></ins>
                <!--ads stop--->
                </div>
            </section>
            <section class="section">
                <div class="container">
                    <div class="row">
                        <div class="col-12">
                            <div
                                class="section-title text-center mb-4 d-flex justify-content-between align-items-center">
                                <h4 class="title mb-0"><i class="min-wujiaox">★</i><i class="max-wujiaox">★</i> Popular
                                    <i class="max-wujiaox">★</i><i class="min-wujiaox">★</i>
                                </h4>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-4 col-lg-3 mt-6 pt-3" v-for="item in popular.slice(0, 20)" :key="item.gameId">
                            <a :href="handleToDetail(item.gameId, 'Popular')">
                                <div class="position-relative overflow-hidden blog rounded shadow">
                                    <div class="position-relative overflow-hidden"><img :src="item.gameLogo"
                                            :data-src="item.gameLogo" :alt="`${item.gameLogo}|${item.gameId}`"
                                            class="img-fluid blog-img">
                                    </div>
                                    <div class="content">
                                        <span class="title text-dark d-block2">{{item.gameName}}</span>
                                    </div>
                                </div>
                            </a>
                        </div>
                        <a href="popular.html" class="more-link"
                            style="width: 90%;display: inline-block;text-align: center;color: #fff;background: #ffbc42;line-height: 40px;border-radius: 20px;margin: 20px auto;font-weight: 600;font-size: 18px;">
                            More →
                        </a>
                    </div>
                </div>
            </section>
            <section class="section">
                <div class="container" v-for="(parent, key) in gameData" :key="parent">
                    <div class="row">
                        <div class="col-12">
                            <div
                                class="section-title text-center mb-4 d-flex justify-content-between align-items-center">
                                <h4 class="title mb-0"><i class="min-wujiaox">★</i><i class="max-wujiaox">★</i>
                                    {{parent.name}} <i class="max-wujiaox">★</i><i class="min-wujiaox">★</i></h4>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-4 col-lg-3 mt-6 pt-3"
                            v-for="child in (parent.displayGames || parent.games || []).slice(0, 12)" :key="child.gameId">
                            <a :href="handleToDetail(child.gameId, parent.name)">
                                <div class="position-relative overflow-hidden blog rounded shadow">
                                    <div class="position-relative overflow-hidden"><img :src="child.gameLogo"
                                            :data-src="child.gameLogo" :alt="`${child.gameLogo}|${child.gameId}`"
                                            class="img-fluid blog-img">
                                    </div>
                                    <div class="content">
                                        <span class="text-dark d-block2">{{child.gameName}}</span>
                                    </div>
                                </div>
                            </a>
                        </div>

                        <!-- </div> -->
                        <a v-if="parent.name !== 'Home'" :href="handleToType(parent)" class="more-link"
                            style="width: 90%;display: inline-block;text-align: center;color: #fff;background: #ffbc42;line-height: 40px;border-radius: 20px;margin: 20px auto;font-weight: 600;font-size: 18px;">
                            More → </a>
                    </div>
            </section>
        </main>
        <footer v-html="footer"></footer>
    </div>
</body>
<script src="script/jquery-1.10.2.js"></script>
<script src="script/main.js"></script>
<script src="script/footer.js"></script>
<script src="script/gameData.js"></script>
<script src="script/vue.min.js"></script>
<script src="script/axios.min.js"></script>
<script src="script/bootstrap.bundle.min.js"></script>
<script src="script/bootstrap-3.3.4.js"></script>
<script src="script/swiper.min.js"></script>
<script src="script/header.js"></script>
<script src="script/index.js"></script>
<script>
    window.onload = function() {
        (adsbygoogle = window.adsbygoogle || []).push({});
    }
</script>
</html>
